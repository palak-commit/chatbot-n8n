<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealthCare Clinic Assistant</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignal = window.OneSignal || [];
      OneSignal.push(() => {
        OneSignal.init({
          appId: "30435956-71bd-428a-a386-8768ef95efa2",
          safari_web_id: "web.onesignal.auto.10435956-71bd-428a-a386-8768ef95efa2",
          allowLocalhostAsSecure: true,
          notifyButton: {
            enable: false, // Bell icon બંધ કર્યું
          },
        });
        // સીધું નેટિવ પ્રોમ્પ્ટ બતાવવા માટે
        OneSignal.Notifications.requestPermission();
      });
    </script>
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        var dark = t ? t === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
